<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entre Nubes | Buzón de Pensamientos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/*=================================================
        ENTRE NUBES
        VERSIÓN 2.0
=================================================*/

*{

margin:0;

padding:0;

box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

background:linear-gradient(180deg,#eaf7ff,#f8fcff);

font-family:'Poppins',sans-serif;

padding:40px 15px;

color:#456172;

}

/*==================================
            CONTENEDOR
==================================*/

.container{

max-width:900px;

margin:auto;

}

/*==================================
              CABECERA
==================================*/

.header{

background:linear-gradient(180deg,#7ccdf2,#b8e6fa,#eefbff);

border-radius:30px;

padding:45px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.12);

position:relative;

overflow:hidden;

margin-bottom:35px;

}

/*==================================
             NUBES
==================================*/

.cloud{

position:absolute;

background:white;

border-radius:100px;

opacity:.75;

}

.cloud::before,
.cloud::after{

content:"";

position:absolute;

background:white;

border-radius:50%;

}

.cloud1{

width:170px;

height:55px;

top:40px;

left:-70px;

animation:cloudMove 40s linear infinite;

}

.cloud1::before{

width:60px;

height:60px;

left:20px;

top:-22px;

}

.cloud1::after{

width:80px;

height:80px;

right:15px;

top:-32px;

}

.cloud2{

width:210px;

height:60px;

top:150px;

right:-90px;

animation:cloudMove2 55s linear infinite;

}

.cloud2::before{

width:70px;

height:70px;

left:18px;

top:-28px;

}

.cloud2::after{

width:90px;

height:90px;

right:18px;

top:-38px;

}

/*==================================
             TITULO
==================================*/

.header h1{

font-size:65px;

font-weight:700;

letter-spacing:4px;

color:#35556b;

position:relative;

z-index:2;

}

.header p{

margin-top:12px;

font-size:19px;

font-family:'Patrick Hand',cursive;

color:#5f7b8c;

position:relative;

z-index:2;

}

/*==================================
          ANIMACIONES
==================================*/

@keyframes cloudMove{

0%{

transform:translateX(0);

}

100%{

transform:translateX(1050px);

}

}

@keyframes cloudMove2{

0%{

transform:translateX(0);

}

100%{

transform:translateX(-1050px);

}

}

/*==================================
      RESPONSIVE
==================================*/

@media(max-width:700px){

.header{

padding:30px 20px;

}

.header h1{

font-size:42px;

}

.header p{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="cloud cloud1"></div>

<div class="cloud cloud2"></div>

<h1>☁ Entre Nubes</h1>

<p>

Un lugar donde los pensamientos también dejan huella.

</p>

</div>
<!--=================================================
            CUADERNO DE PENSAMIENTOS
==================================================-->

<style>

.notebook{

background:#fffefa;

border-radius:28px;

padding:35px;

box-shadow:0 15px 35px rgba(0,0,0,.10);

position:relative;

overflow:hidden;

margin-bottom:35px;

}

/* Línea roja del cuaderno */

.notebook::before{

content:"";

position:absolute;

left:60px;

top:0;

bottom:0;

width:3px;

background:#ff9e9e;

opacity:.8;

}

/* Líneas azules */

.notebook::after{

content:"";

position:absolute;

left:0;

top:0;

right:0;

bottom:0;

background:repeating-linear-gradient(

transparent,

transparent 33px,

#d7ecff 34px

);

pointer-events:none;

}

.notebookContent{

position:relative;

z-index:2;

padding-left:55px;

}

.notebook h2{

font-size:32px;

color:#3c5d74;

margin-bottom:8px;

font-family:'Patrick Hand',cursive;

}

.notebook p{

color:#688091;

line-height:1.8;

margin-bottom:25px;

}

/*==================================
          FORMULARIO
==================================*/

.formGroup{

margin-bottom:18px;

}

.formGroup label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#456172;

}

.formGroup input,

.formGroup textarea{

width:100%;

border:none;

border-radius:16px;

padding:14px 16px;

font-size:15px;

font-family:'Poppins',sans-serif;

background:#f6fbff;

box-shadow:inset 0 0 0 2px #dceef9;

outline:none;

transition:.3s;

}

.formGroup input:focus,

.formGroup textarea:focus{

box-shadow:inset 0 0 0 2px #8fd2f2;

background:white;

}

.formGroup textarea{

resize:none;

min-height:140px;

}

/*==================================
          ESTADOS
==================================*/

.estadoSelector{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-top:10px;

}

.estadoBtn{

width:48px;

height:48px;

border-radius:50%;

border:none;

font-size:22px;

cursor:pointer;

background:white;

box-shadow:0 4px 10px rgba(0,0,0,.08);

transition:.25s;

}

.estadoBtn:hover{

transform:scale(1.15);

}

.estadoActivo{

background:#bfe8ff !important;

}

/*==================================
            BOTÓN
==================================*/

.publicar{

margin-top:15px;

border:none;

background:#77ccef;

color:white;

font-size:16px;

padding:15px 28px;

border-radius:30px;

cursor:pointer;

font-weight:600;

transition:.3s;

box-shadow:0 10px 20px rgba(68,177,230,.35);

}

.publicar:hover{

transform:translateY(-3px);

background:#63bde3;

}

@media(max-width:700px){

.notebook{

padding:22px;

}

.notebookContent{

padding-left:25px;

}

.notebook::before{

left:28px;

}

}

</style>

<div class="notebook">

<div class="notebookContent">

<h2>

📝 Buzón de Pensamientos

</h2>

<p>

Si alguna historia te hizo sentir algo, puedes dejar aquí un pequeño pensamiento.

</p>

<div class="formGroup">

<label>

Nombre

</label>

<input
type="text"
id="nombre"
maxlength="35"
placeholder="Tu nombre (opcional)">

</div>

<div class="formGroup">

<label>

¿Cómo te hizo sentir?

</label>

<div class="estadoSelector">

<button class="estadoBtn">😊</button>

<button class="estadoBtn">🥹</button>

<button class="estadoBtn">😌</button>

<button class="estadoBtn">🤍</button>

<button class="estadoBtn">🌧️</button>

<button class="estadoBtn">💙</button>

<button class="estadoBtn">☁️</button>

<button class="estadoBtn">✨</button>

</div>

</div>

<div class="formGroup">

<label>

Tu pensamiento

</label>

<textarea

id="mensaje"

maxlength="600"

placeholder="Escribe aquí lo que esta historia despertó en ti..."></textarea>

</div>

<button
class="publicar"
id="btnPublicar">

☁ Publicar pensamiento

</button>

</div>

</div>

<!-- Aquí aparecerán los comentarios -->

<div id="comentarios"></div>
<!--=================================================
        FIREBASE + JAVASCRIPT
==================================================-->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,

collection,

addDoc,

serverTimestamp,

query,

orderBy,

onSnapshot

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/*==================================
        CONFIGURACIÓN FIREBASE
==================================*/

const firebaseConfig={

apiKey:"AIzaSyA8WGCAHKXLrIjPFLqg1OFRVynDzy3xx-Q",

authDomain:"entrenubes-9199b.firebaseapp.com",

projectId:"entrenubes-9199b",

storageBucket:"entrenubes-9199b.firebasestorage.app",

messagingSenderId:"1076182010590",

appId:"1:1076182010590:web:dee43b3e936c351b50104f"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

/*==================================
        VARIABLES
==================================*/

let estadoSeleccionado="☁️";

const botonesEstado=document.querySelectorAll(".estadoBtn");

const botonPublicar=document.getElementById("btnPublicar");

/*==================================
      SELECCIONAR EMOCIÓN
==================================*/

botonesEstado.forEach(boton=>{

boton.addEventListener("click",()=>{

botonesEstado.forEach(b=>b.classList.remove("estadoActivo"));

boton.classList.add("estadoActivo");

estadoSeleccionado=boton.innerHTML;

});

});

/*==================================
        PUBLICAR COMENTARIO
==================================*/

async function publicar(){

const nombre=document.getElementById("nombre").value.trim();

const mensaje=document.getElementById("mensaje").value.trim();

if(mensaje===""){

alert("Escribe un pensamiento antes de publicarlo.");

return;

}

await addDoc(collection(db,"comentarios"),{

nombre:nombre===""?"Anónimo":nombre,

mensaje:mensaje,

estado:estadoSeleccionado,

fecha:serverTimestamp(),

fijado:false,

likes:0

});

document.getElementById("nombre").value="";

document.getElementById("mensaje").value="";

estadoSeleccionado="☁️";

botonesEstado.forEach(b=>b.classList.remove("estadoActivo"));

}

botonPublicar.addEventListener("click",publicar);

/*==================================
      MOSTRAR COMENTARIOS
==================================*/

const lista=document.getElementById("comentarios");

const consulta=query(

collection(db,"comentarios"),

orderBy("fecha","desc")

);

onSnapshot(consulta,(snapshot)=>{

lista.innerHTML="";

/* Aquí construiremos cada comentario
en la Parte 4 */

snapshot.forEach((doc)=>{

const data=doc.data();

const tarjeta=document.createElement("div");

tarjeta.className="comentario";

tarjeta.innerHTML=`

<div class="contenidoComentario">

<div class="nombreComentario">

${data.estado} ${data.nombre}

</div>

<div class="tiempoComentario">

🕒 ${tiempo(data.fecha)}

</div>

<div class="textoComentario">

${data.mensaje}

</div>

<div class="accionesComentario">

<button class="responderBtn">

💬 Responder

</button>

</div>

<div class="zonaRespuestas">

<!-- Aquí aparecerán las respuestas -->

</div>

</div>

`;
lista.appendChild(tarjeta);

});

});

</script>

</body>

</html>
