<script type="module">
import { doc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.likeComentario = async function(id, likesActuales){

const ref = doc(db, "comentarios", id);

await updateDoc(ref, {
likes: increment(1)
});

};
// Importar Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIGURACIÓN DE TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyA8WGCAHKXLrIjPFLqg1OFRVynDzy3xx-Q",
  authDomain: "entrenubes-9199b.firebaseapp.com",
  projectId: "entrenubes-9199b",
  storageBucket: "entrenubes-9199b.firebasestorage.app",
  messagingSenderId: "1076182010590",
  appId: "1:1076182010590:web:dee43b3e936c351b50104f"
};

// INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// COLECCIÓN
const comentariosRef = collection(db, "comentarios");

// GUARDAR COMENTARIO
async function guardarComentario(nombre, texto, estado){

try {

await addDoc(comentariosRef, {
nombre: nombre || "Anónimo",
texto: texto,
estado: estado,
fecha: Date.now()
});

} catch (error) {
console.error("Error guardando:", error);
}

}

// HACER GLOBAL la función para Parte 2
window.enviarComentarioFirebase = guardarComentario;

// LEER COMENTARIOS EN TIEMPO REAL
const q = query(comentariosRef, orderBy("fecha", "desc"));
function tiempoTranscurrido(fecha){

const segundos = Math.floor((Date.now() - fecha)/1000);

if(segundos<60) return "Hace unos segundos";

const minutos=Math.floor(segundos/60);

if(minutos<60)
return "Hace "+minutos+(minutos==1?" minuto":" minutos");

const horas=Math.floor(minutos/60);

if(horas<24)
return "Hace "+horas+(horas==1?" hora":" horas");

const dias=Math.floor(horas/24);

if(dias<30)
return "Hace "+dias+(dias==1?" día":" días");

const meses=Math.floor(dias/30);

if(meses<12)
return "Hace "+meses+(meses==1?" mes":" meses");

const años=Math.floor(meses/12);

return "Hace "+años+(años==1?" año":" años");

}
onSnapshot(q, (snapshot)=>{

const lista = document.getElementById("lista");
lista.innerHTML = "";

snapshot.forEach(doc=>{

const data = doc.data();

const div = document.createElement("div");
div.className = "comentario";

div.innerHTML = `
<b>☁ ${data.nombre}</b>

<div style="
font-size:12px;
color:#7a8c9c;
margin-top:3px;
margin-bottom:10px;
">

🕒 ${tiempoTranscurrido(data.fecha)}

</div>

<p class="estado">${data.estado}</p>

<p>${data.texto}</p>
`;

<div class="acciones">
<button onclick="likeComentario('${doc.id}', ${data.likes || 0})">
❤️ ${data.likes || 0}
</button>
</div>
`;

lista.appendChild(div);

});

});

</script>
