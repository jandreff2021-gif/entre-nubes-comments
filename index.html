<!DOCTYPE html>
<html lang="es">
<head>

  <!--=========================================
        META Y CONFIGURACIÓN BASE
  ==========================================-->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Entre Nubes – Un lugar donde los pensamientos también dejan huella." />
  <title>☁ Entre Nubes</title>

  <!--=========================================
        TIPOGRAFÍAS GOOGLE FONTS
  ==========================================-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    /*=========================================
          RESET Y VARIABLES GLOBALES
    ==========================================*/
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-sky:        #ddefff;
      --color-sky-light:  #eef7ff;
      --color-sky-mid:    #c2dcf5;
      --color-white:      #ffffff;
      --color-blue-soft:  #a8cce8;
      --color-blue-line:  #c5dff5;
      --color-red-line:   #f5a0a0;
      --color-grey-1:     #f4f7fb;
      --color-grey-2:     #e8eef5;
      --color-grey-3:     #b0c0d0;
      --color-grey-text:  #8898aa;
      --color-text:       #3d5166;
      --color-text-soft:  #6b82a0;
      --color-clip:       #9ab8d4;
      --color-like:       #e07b8a;
      --font-body:        'Poppins', sans-serif;
      --font-title:       'Patrick Hand', cursive;
      --shadow-soft:      0 4px 24px rgba(120,160,200,0.13);
      --shadow-card:      0 6px 32px rgba(120,160,200,0.18);
      --radius-card:      18px;
      --radius-input:     12px;
      --transition:       0.25s ease;
    }

    /*=========================================
          BASE GLOBAL
    ==========================================*/
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(175deg, #ddefff 0%, #eef7ff 40%, #f8fbff 100%);
      min-height: 100vh;
      color: var(--color-text);
      overflow-x: hidden;
    }

    /*=========================================
          ENCABEZADO / HERO
    ==========================================*/
    .hero {
      position: relative;
      width: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      overflow: hidden;
      text-align: center;
    }

    /* Degradado inferior del hero */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #eef7ff);
      pointer-events: none;
    }

    /* Nube decorativa base */
    .cloud {
      position: absolute;
      background: var(--color-white);
      border-radius: 50px;
      opacity: 0.75;
      filter: blur(1px);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: var(--color-white);
      border-radius: 50%;
    }

    /* Nube 1 – izquierda */
    .cloud-1 {
      width: 160px;
      height: 50px;
      top: 40px;
      left: -20px;
      animation: floatCloud1 18s ease-in-out infinite;
    }

    .cloud-1::before {
      width: 70px;
      height: 70px;
      top: -35px;
      left: 20px;
    }

    .cloud-1::after {
      width: 50px;
      height: 50px;
      top: -25px;
      left: 65px;
    }

    /* Nube 2 – derecha */
    .cloud-2 {
      width: 200px;
      height: 60px;
      top: 60px;
      right: -30px;
      animation: floatCloud2 22s ease-in-out infinite;
    }

    .cloud-2::before {
      width: 90px;
      height: 90px;
      top: -45px;
      left: 25px;
    }

    .cloud-2::after {
      width: 65px;
      height: 65px;
      top: -30px;
      left: 90px;
    }

    /* Nube 3 – pequeña centro-izquierda */
    .cloud-3 {
      width: 100px;
      height: 34px;
      top: 160px;
      left: 12%;
      opacity: 0.45;
      animation: floatCloud1 26s ease-in-out infinite reverse;
    }

    .cloud-3::before {
      width: 44px;
      height: 44px;
      top: -22px;
      left: 14px;
    }

    .cloud-3::after {
      width: 32px;
      height: 32px;
      top: -16px;
      left: 48px;
    }

    @keyframes floatCloud1 {
      0%   { transform: translateX(0px) translateY(0px); }
      30%  { transform: translateX(18px) translateY(-6px); }
      60%  { transform: translateX(8px) translateY(4px); }
      100% { transform: translateX(0px) translateY(0px); }
    }

    @keyframes floatCloud2 {
      0%   { transform: translateX(0px) translateY(0px); }
      25%  { transform: translateX(-14px) translateY(5px); }
      55%  { transform: translateX(-22px) translateY(-4px); }
      100% { transform: translateX(0px) translateY(0px); }
    }

    /* Título principal */
    .hero-title {
      font-family: var(--font-title);
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      color: var(--color-text);
      letter-spacing: 0.02em;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 12px rgba(140,180,220,0.3);
    }

    /* Subtítulo */
    .hero-subtitle {
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
      color: var(--color-text-soft);
      font-weight: 300;
      margin-top: 10px;
      letter-spacing: 0.03em;
      position: relative;
      z-index: 2;
      max-width: 480px;
    }

    /*=========================================
          CONTENEDOR PRINCIPAL
    ==========================================*/
    .main-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /*=========================================
          PANEL DE ADMINISTRADOR
    ==========================================*/
    .admin-bar {
      display: none; /* oculto por defecto, JS lo activa */
      background: rgba(255,255,255,0.85);
      border: 1.5px solid var(--color-sky-mid);
      border-radius: var(--radius-input);
      padding: 12px 20px;
      margin-bottom: 28px;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-soft);
      flex-wrap: wrap;
    }

    .admin-bar.visible {
      display: flex;
    }

    .admin-badge {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--color-blue-soft);
      background: var(--color-sky-light);
      border: 1.5px solid var(--color-blue-line);
      border-radius: 20px;
      padding: 4px 12px;
      letter-spacing: 0.04em;
    }

    .btn-admin-login {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--color-text-soft);
      background: transparent;
      border: 1.5px solid var(--color-grey-3);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      transition: all var(--transition);
      margin-left: auto;
    }

    .btn-admin-login:hover {
      background: var(--color-grey-1);
      border-color: var(--color-blue-soft);
      color: var(--color-text);
    }

    /*=========================================
          FORMULARIO – CUADERNO
    ==========================================*/
    .notebook-form {
      background: var(--color-white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 36px 36px 30px 52px; /* izquierda extra para la línea roja */
      margin-bottom: 48px;
      position: relative;
      overflow: hidden;

      /* Líneas horizontales de cuaderno */
      background-image:
        linear-gradient(var(--color-blue-line) 1px, transparent 1px);
      background-size: 100% 32px;
      background-position: 0 48px;
    }

    /* Línea roja vertical de cuaderno */
    .notebook-form::before {
      content: '';
      position: absolute;
      left: 36px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-red-line);
    }

    /* Espiral decorativa (puntos) */
    .notebook-form::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 20px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 22px,
        var(--color-grey-2) 22px,
        var(--color-grey-2) 34px
      );
    }

    .form-title {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: var(--color-text);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    /* Grupo de campo */
    .form-group {
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-soft);
      margin-bottom: 7px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--color-text);
      background: var(--color-sky-light);
      border: 1.5px solid var(--color-blue-line);
      border-radius: var(--radius-input);
      padding: 11px 16px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .form-input::placeholder {
      color: var(--color-grey-3);
    }

    .form-input:focus {
      border-color: var(--color-blue-soft);
      box-shadow: 0 0 0 3px rgba(168,204,232,0.25);
    }

    /* Selector de emojis */
    .emoji-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .emoji-btn {
      font-size: 1.4rem;
      background: var(--color-sky-light);
      border: 2px solid var(--color-blue-line);
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      user-select: none;
    }

    .emoji-btn:hover {
      background: var(--color-sky);
      border-color: var(--color-blue-soft);
      transform: scale(1.1);
    }

    .emoji-btn.selected {
      background: var(--color-sky-mid);
      border-color: var(--color-blue-soft);
      box-shadow: 0 0 0 3px rgba(168,204,232,0.35);
      transform: scale(1.12);
    }

    /* Textarea */
    .form-textarea {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--color-text);
      background: transparent; /* para ver las líneas del cuaderno */
      border: none;
      border-bottom: 1.5px solid var(--color-blue-line);
      border-radius: 0;
      padding: 6px 2px;
      resize: none;
      outline: none;
      min-height: 120px;
      line-height: 32px; /* alinear con las líneas del fondo */
      transition: border-color var(--transition);
    }

    .form-textarea::placeholder {
      color: var(--color-grey-3);
      font-style: italic;
    }

    .form-textarea:focus {
      border-bottom-color: var(--color-blue-soft);
    }

    /* Contador de caracteres */
    .char-counter {
      text-align: right;
      font-size: 0.75rem;
      color: var(--color-grey-3);
      margin-top: 5px;
      transition: color var(--transition);
    }

    .char-counter.warning {
      color: #e07b8a;
    }

    /* Botón publicar */
    .btn-publish {
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--color-text);
      background: linear-gradient(135deg, #ddefff 0%, #c2dcf5 100%);
      border: 1.5px solid var(--color-blue-soft);
      border-radius: 30px;
      padding: 12px 30px;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: var(--shadow-soft);
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-publish:hover {
      background: linear-gradient(135deg, #c2dcf5 0%, #a8cce8 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(120,160,200,0.28);
    }

    .btn-publish:active {
      transform: translateY(0px);
    }

    .btn-publish:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /*=========================================
          SEPARADOR DE SECCIÓN
    ==========================================*/
    .section-divider {
      text-align: center;
      margin-bottom: 32px;
    }

    .section-divider-title {
      font-family: var(--font-title);
      font-size: 1.1rem;
      color: var(--color-text-soft);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .section-divider-title::before,
    .section-divider-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: var(--color-grey-2);
    }

    /*=========================================
          LISTA DE COMENTARIOS
    ==========================================*/
    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Mensaje vacío */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-grey-3);
    }

    .empty-state-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
      display: block;
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 0.9rem;
      font-style: italic;
    }

    /*=========================================
          TARJETA DE COMENTARIO
    ==========================================*/
    .comment-card {
      background: var(--color-white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 28px 28px 20px 50px; /* espacio para línea roja */
      position: relative;
      overflow: hidden;
      animation: cardAppear 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;

      /* Líneas horizontales cuaderno */
      background-image:
        linear-gradient(var(--color-blue-line) 1px, transparent 1px);
      background-size: 100% 28px;
      background-position: 0 42px;

      transition: box-shadow var(--transition), transform var(--transition);
    }

    .comment-card:hover {
      box-shadow: 0 10px 40px rgba(120,160,200,0.22);
      transform: translateY(-2px);
    }

    /* Línea roja vertical */
    .comment-card::before {
      content: '';
      position: absolute;
      left: 34px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-red-line);
    }

    /* Clip decorativo arriba */
    .comment-clip {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 34px;
      z-index: 3;
    }

    .comment-clip svg {
      width: 100%;
      height: 100%;
    }

    /* Indicador fijado */
    .comment-card.pinned {
      border: 2px solid var(--color-blue-soft);
      background-color: #f0f8ff;
    }

    .pinned-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-blue-soft);
      background: var(--color-sky-light);
      border: 1px solid var(--color-blue-line);
      border-radius: 20px;
      padding: 2px 10px;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    /* Cabecera de la tarjeta */
    .comment-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .comment-emoji {
      font-size: 1.5rem;
      line-height: 1;
    }

    .comment-author {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--color-text);
    }

    .comment-time {
      font-size: 0.75rem;
      color: var(--color-grey-3);
      font-style: italic;
    }

    /* Texto del comentario */
    .comment-body {
      font-size: 0.93rem;
      color: var(--color-text);
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
    }

    /* Acc
